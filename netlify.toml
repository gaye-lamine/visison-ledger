[build]
  # Navigate directly into the frontend subdirectory for building
  base = "frontend"
  # The output directory generated by Vite's build command inside the frontend folder
  publish = "dist"
  # The compile command to package the React frontend for production
  command = "npm run build"

[[redirects]]
  # Redirect all incoming route requests to the SPA index page to prevent 404 errors on browser refreshes
  from = "/*"
  to = "/index.html"
  status = 200
